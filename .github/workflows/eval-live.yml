        id: config
        run: |
          if [ -z "${CLNKR_EVALUATION_API_KEY}" ]; then
            echo "Live evaluation skipped: ANTHROPIC_API_KEY secret is not set."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
        env:
          CLNKR_EVALUATION_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/checkout@v5
        if: steps.config.outputs.configured == 'true'

      - uses: actions/setup-go@v6
        if: steps.config.outputs.configured == 'true'
        with:
          go-version-file: go.mod
          cache-dependency-path: cmd/clnkr/go.sum

      - name: Add local user bin to PATH
        if: steps.config.outputs.configured == 'true'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install clankerval release package
        if: steps.config.outputs.configured == 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(sed -n 's/^CLANKERVAL_MIN_VERSION := //p' Makefile)"
          arch="$(dpkg --print-architecture)"
          pattern="clankerval_${version}-*_${arch}.deb"
          gh release download "v${version}" --repo clnkr-ai/clankerval --pattern "$pattern"
          deb="$(find . -maxdepth 1 -name "$pattern" -print -quit)"
          sudo apt-get update
