name: Live Evaluations

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  evaluations-live:
    runs-on: ubuntu-latest
    steps:
      - name: Check live evaluation configuration
        id: config
        run: |
          if [ -z "${CLNKR_EVALUATION_API_KEY}" ]; then
            echo "Live evaluation skipped: CLNKR_EVALUATION_API_KEY secret is not set."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
        env:
          CLNKR_EVALUATION_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - uses: actions/checkout@v5
        if: steps.config.outputs.configured == 'true'

      - uses: actions/setup-go@v6
        if: steps.config.outputs.configured == 'true'
        with:
          go-version-file: go.mod
          cache-dependency-path: cmd/clnkr/go.sum

      - name: Add local user bin to PATH
        if: steps.config.outputs.configured == 'true'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install clankerval
        if: steps.config.outputs.configured == 'true'
        run: ./scripts/install-clankerval.sh

      - name: Run live evaluations
        if: steps.config.outputs.configured == 'true'
        run: |
          : "${CLNKR_EVALUATION_BASE_URL:=https://api.openai.com/v1}"
          : "${CLNKR_EVALUATION_MODEL:=gpt-5.4-nano}"
          export CLNKR_EVALUATION_MODE=live-provider
          export CLNKR_EVALUATION_API_KEY
          export CLNKR_EVALUATION_BASE_URL
          export CLNKR_EVALUATION_MODEL
          make evaluations-live
        env:
          CLNKR_EVALUATION_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLNKR_EVALUATION_BASE_URL: ${{ vars.CLNKR_EVALUATION_BASE_URL }}
          CLNKR_EVALUATION_MODEL: ${{ vars.CLNKR_EVALUATION_MODEL }}

      - name: Show live evaluation bundles on failure
        if: failure() && steps.config.outputs.configured == 'true'
        run: |
          find evaluations/trials -maxdepth 3 -type f | sort || true
          echo
          find evaluations/reports -maxdepth 1 -type f | sort || true
          for trial_dir in $(find evaluations/trials -mindepth 1 -maxdepth 1 -type d | sort); do
            echo
            echo "== $(basename "$trial_dir") bundle =="
            sed -n '1,200p' "$trial_dir/bundle.json" || true
            echo
            echo "== $(basename "$trial_dir") normalized graders =="
            sed -n '1,200p' "$trial_dir/normalized/graders.jsonl" || true
            echo
            echo "== $(basename "$trial_dir") raw events =="
            sed -n '1,200p' "$trial_dir/raw/events.jsonl" || true
          done

      - name: Upload live evaluation artifacts
        if: always() && steps.config.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-evaluations-${{ github.run_id }}
          path: |
            evaluations/trials/
            evaluations/reports/
          if-no-files-found: warn
          retention-days: 14
