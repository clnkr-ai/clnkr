name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows
        run: |
          "$(go env GOPATH)/bin/actionlint"
          ./scripts/check-workflow-make-targets.sh
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

      - name: Test
        run: go test -race ./... -v

      - name: Build
        run: make build

      - name: Install Hugo
        run: go install github.com/gohugoio/hugo@v0.159.1

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: make docs

  guardrails:
    runs-on: ubuntu-latest
    env:
      THOTH_RELEASE_TAG: thoth-guardrail-bin-0.5.2
      THOTH_SHA256: 9168a0ba9ceeb6d556bc42c800b0435ef43b4a9f9b5c1a631b583e79a180c8df
    steps:
      - uses: actions/checkout@v5

      - name: Install thoth guardrail binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/tools
          gh release download "$THOTH_RELEASE_TAG" \
            --repo clnkr-ai/clnkr \
            --pattern thoth-linux-amd64 \
            --dir build/tools
          echo "$THOTH_SHA256  build/tools/thoth-linux-amd64" | sha256sum -c -
          chmod +x build/tools/thoth-linux-amd64
          build/tools/thoth-linux-amd64 --help
          echo "THOTH_BIN=$PWD/build/tools/thoth-linux-amd64" >> "$GITHUB_ENV"

      - name: Run guardrail reports
        run: |
          make thoth-critical-check
          make architecture-shape-report
          make semantic-cohesion-report
          make test-fidelity-report

  evaluations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Add local user bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install clankerval release package
        env:
          DEBIAN_FRONTEND: noninteractive
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(sed -n 's/^CLANKERVAL_PINNED_VERSION := //p' Makefile)"
          arch="$(dpkg --print-architecture)"
          pattern="clankerval_${version}-*_${arch}.deb"
          gh release download "v${version}" --repo clnkr-ai/clankerval --pattern "$pattern"
          deb="$(find . -maxdepth 1 -name "$pattern" -print -quit)"
          sudo apt-get update
          sudo apt-get install -y "$deb"
          rm -f "$deb"

      - name: Run mock-provider evaluations
        run: make evaluations
