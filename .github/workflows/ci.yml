name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: cmd/clnkr/go.sum

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows
        run: |
          "$(go env GOPATH)/bin/actionlint"
          python3 ./scripts/check-workflow-make-targets.py

      - name: Test clankerval resolver
        run: python3 -m unittest scripts.test_require_clankerval -v

      - name: Lint core
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

      - name: Lint TUI
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1
          working-directory: cmd/clnkr

      - name: Test core
        run: go test -race ./... -v

      - name: Test TUI
        run: cd cmd/clnkr && go test -race ./... -v

      - name: Build
        run: make build

      - name: Install Hugo
        run: go install github.com/gohugoio/hugo@v0.159.1

      - name: Build site
        run: make docs

  evaluations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: cmd/clnkr/go.sum

      - name: Add local user bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install clankerval
        run: ./scripts/install-clankerval.sh

      - name: Run mock-provider evaluations
        run: make evaluations
