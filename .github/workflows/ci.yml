name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint core
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

      - name: Lint TUI
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1
          working-directory: cmd/clnkr

      - name: Test core
        run: go test -race ./... -v

      - name: Test TUI
        run: cd cmd/clnkr && go test -race ./... -v

      - name: Build
        run: make build-all

      - name: Install Hugo
        run: go install github.com/gohugoio/hugo@v0.159.1

      - name: Build site
        run: make site-build
