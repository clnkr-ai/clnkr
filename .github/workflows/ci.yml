name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows
        run: |
          "$(go env GOPATH)/bin/actionlint"
          ./scripts/check-workflow-make-targets.sh
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

      - name: Test
        run: go test -race ./... -v

      - name: Build
        run: make build

      - name: Install Hugo
        run: go install github.com/gohugoio/hugo@v0.159.1

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: make docs

  evaluations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Add local user bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install clankerval release package
        env:
          DEBIAN_FRONTEND: noninteractive
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(sed -n 's/^CLANKERVAL_PINNED_VERSION := //p' Makefile)"
          arch="$(dpkg --print-architecture)"
          pattern="clankerval_${version}-*_${arch}.deb"
          gh release download "v${version}" --repo clnkr-ai/clankerval --pattern "$pattern"
          deb="$(find . -maxdepth 1 -name "$pattern" -print -quit)"
          sudo apt-get update
          sudo apt-get install -y "$deb"
          rm -f "$deb"

      - name: Run mock-provider evaluations
        run: make evaluations
