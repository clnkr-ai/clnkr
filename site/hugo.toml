baseURL = "https://clnkr.ai/"
languageCode = "en-us"
title = "clnkr"

disableKinds = ["taxonomy", "term", "RSS", "sitemap"]

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true

[menu]
  [[menu.main]]
    name = "Docs"
    pageRef = "/docs"
    weight = 10
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/clnkr-ai/clnkr"
    weight = 20

[params]
  description = "A minimal coding agent. Query an LLM, execute bash commands, repeat."
  repo = "https://github.com/clnkr-ai/clnkr"

  [params.shortcuts]
    help = "/"
    docs = "/docs/"
    github = "https://github.com/clnkr-ai/clnkr"

  [params.install]
    homebrew_label = "Homebrew"
    homebrew_platform = "macOS"
    homebrew_url = "https://github.com/clnkr-ai/homebrew-tap"
    homebrew_command = "brew install clnkr-ai/tap/clnkr"
    apt_label = "apt"
    apt_platform = "Debian/Ubuntu"
    apt_arch = "amd64"
