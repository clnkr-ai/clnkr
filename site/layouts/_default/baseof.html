<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="{{ if .IsHome }}page-home{{ else if eq .Section "docs" }}page-docs{{ else }}page-default{{ end }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="viewport">
      <div class="screen">
        <header class="status-bar">
          <span>F1 Help</span>
          <span>F2 Docs</span>
          <span>F3 GitHub</span>
        </header>

        <main id="main-content" class="screen-main">
          {{ block "main" . }}{{ end }}
        </main>

        <footer class="window-bar window-bar-bottom">
          <span>man clnkr</span>
          <span>/docs/</span>
          <span>github.com/clnkr-ai/clnkr</span>
        </footer>
      </div>
    </div>
  </body>
</html>
